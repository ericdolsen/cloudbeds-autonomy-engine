<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Front Desk Alerts — Gateway Park</title>
  <script src="/socket.io/socket.io.js"></script>
  <!-- Google Fonts: Inter for UI, EB Garamond for the Prairie display serif -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Gateway Park theme tokens + components (see public/handoff/STYLE-GUIDE.md) -->
  <link rel="stylesheet" href="/handoff/gateway-theme.css">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100vh; }

    header {
      padding: 22px 32px;
      background: color-mix(in oklab, var(--p-deep) 92%, black 8%);
      border-bottom: 1px solid var(--p-rule);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    header h1 {
      margin: 0;
      font-family: var(--p-serif);
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: -0.005em;
      color: var(--p-ink);
    }
    header .meta {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--p-ink-3);
      font-weight: 500;
    }
    #counter { font-variant-numeric: tabular-nums; }

    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: middle;
    }
    .connected {
      background: var(--p-accent);
      box-shadow: 0 0 0 3px color-mix(in oklab, var(--p-accent) 22%, transparent);
    }
    .disconnected {
      background: #d47272;
      box-shadow: 0 0 0 3px rgba(212, 114, 114, 0.22);
    }

    main { padding: 24px 32px; max-width: 1100px; margin: 0 auto; }

    .empty {
      text-align: center;
      padding: 96px 20px;
      color: var(--p-ink-3);
      font-size: 14px;
      letter-spacing: 0.05em;
    }
    .empty .check {
      font-family: var(--p-serif);
      font-style: italic;
      font-size: 2.4rem;
      color: var(--p-accent);
      margin-bottom: 18px;
      letter-spacing: -0.01em;
    }

    .alert {
      background: var(--p-deep-2);
      border: 1px solid var(--p-rule);
      border-left: 3px solid var(--p-accent);
      border-radius: var(--p-radius);
      padding: 22px 26px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      animation: slideIn 0.25s ease;
    }
    @keyframes slideIn {
      from { transform: translateY(-8px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .alert.urgency-high     { border-left-color: #d4a256; }
    .alert.urgency-critical {
      border-left-color: #d47272;
      animation: pulse 1.4s ease-in-out infinite;
    }
    .alert.urgency-other    { border-left-color: var(--p-accent); }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(212, 114, 114, 0.0); }
      50%      { box-shadow: 0 0 0 4px rgba(212, 114, 114, 0.30); }
    }

    .alert .body { flex: 1; min-width: 0; }
    .alert .urgency-tag {
      display: inline-block;
      padding: 3px 9px;
      border-radius: var(--p-radius);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 10px;
      color: var(--p-ink-2);
      background: rgba(242, 240, 235, 0.06);
    }
    .alert.urgency-high .urgency-tag {
      color: #d4a256;
      background: rgba(212, 162, 86, 0.14);
    }
    .alert.urgency-critical .urgency-tag {
      color: #d47272;
      background: rgba(212, 114, 114, 0.16);
    }
    .alert.urgency-other .urgency-tag {
      color: var(--p-accent);
      background: color-mix(in oklab, var(--p-accent) 14%, transparent);
    }

    .alert .message {
      font-size: 1.15rem;
      line-height: 1.45;
      font-weight: 500;
      word-wrap: break-word;
      color: var(--p-ink);
    }
    .alert .ts {
      font-size: 11px;
      letter-spacing: 0.05em;
      color: var(--p-ink-3);
      margin-top: 10px;
    }

    .ack-btn {
      background: transparent;
      color: var(--p-ink);
      border: 1px solid var(--p-rule);
      padding: 12px 20px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      border-radius: var(--p-radius);
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .ack-btn:hover  { border-color: var(--p-accent); color: var(--p-accent); }
    .ack-btn:active { transform: scale(0.98); }

    .audio-overlay {
      position: fixed;
      inset: 0;
      background: color-mix(in oklab, var(--p-deep) 96%, black 4%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
      z-index: 1000;
      cursor: pointer;
      text-align: center;
      padding: 20px;
    }
    .audio-overlay .icon {
      font-size: 3.2rem;
      color: var(--p-accent);
      opacity: 0.85;
    }
    .audio-overlay h2 {
      margin: 0;
      font-family: var(--p-serif);
      font-weight: 500;
      font-size: 1.6rem;
      color: var(--p-ink);
      letter-spacing: -0.005em;
    }
    .audio-overlay p {
      margin: 0;
      color: var(--p-ink-2);
      max-width: 480px;
      line-height: 1.55;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      header { padding: 18px 20px; }
      main { padding: 16px 20px; }
      .alert { flex-direction: column; align-items: stretch; }
      .ack-btn { width: 100%; }
    }
  </style>
</head>
<body class="prairie">
  <div id="audioOverlay" class="audio-overlay">
    <div class="icon">🔔</div>
    <h2>Tap anywhere to enable sound</h2>
    <p>Browsers block audio until you interact with the page. Tap once to allow chimes for incoming alerts.</p>
  </div>

  <header>
    <div>
      <h1>Front Desk Alerts</h1>
      <div class="meta"><span id="statusDot" class="status-dot disconnected"></span><span id="statusText">Connecting…</span></div>
    </div>
    <div class="meta" id="counter">0 active</div>
  </header>

  <main>
    <div id="emptyState" class="empty">
      <div class="check">✅</div>
      <div>No active alerts. You'll hear a chime when one arrives.</div>
    </div>
    <div id="alertList"></div>
  </main>

  <script>
    let audioEnabled = false;
    let audioCtx = null;
    let activeKlaxons = new Map(); // alertId -> intervalHandle (so we can stop on ack)
    let alerts = new Map(); // id -> alert

    const overlay = document.getElementById('audioOverlay');
    const list = document.getElementById('alertList');
    const empty = document.getElementById('emptyState');
    const counter = document.getElementById('counter');
    const dot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');

    overlay.addEventListener('click', enableAudio, { once: true });

    function enableAudio() {
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        // A brief silent buffer to fully unlock audio on iOS Safari.
        const buf = audioCtx.createBuffer(1, 1, 22050);
        const src = audioCtx.createBufferSource();
        src.buffer = buf; src.connect(audioCtx.destination); src.start(0);
        audioEnabled = true;
        overlay.style.display = 'none';
      } catch (e) {
        console.error('Audio init failed:', e);
        overlay.querySelector('p').textContent = 'Audio not available in this browser. Alerts will still appear visually.';
      }
    }

    function tone(frequency, durationMs, volume = 0.25, type = 'sine') {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.value = frequency;
      gain.gain.setValueAtTime(volume, audioCtx.currentTime);
      // Quick fade-out to avoid click on stop.
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + durationMs / 1000);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + durationMs / 1000);
    }

    function playChime() {
      // Two soft beeps, doorbell-ish.
      tone(660, 220, 0.22);
      setTimeout(() => tone(520, 280, 0.22), 230);
    }

    function playKlaxonOnce() {
      tone(880, 280, 0.35, 'square');
      setTimeout(() => tone(620, 280, 0.35, 'square'), 320);
    }

    function startKlaxon(id) {
      if (activeKlaxons.has(id)) return;
      playKlaxonOnce();
      const handle = setInterval(playKlaxonOnce, 1400);
      activeKlaxons.set(id, handle);
    }

    function stopKlaxon(id) {
      const handle = activeKlaxons.get(id);
      if (handle) {
        clearInterval(handle);
        activeKlaxons.delete(id);
      }
    }

    function formatTimeAgo(ms) {
      const sec = Math.max(0, Math.floor((Date.now() - ms) / 1000));
      if (sec < 60) return `${sec}s ago`;
      const min = Math.floor(sec / 60);
      if (min < 60) return `${min}m ago`;
      const hr = Math.floor(min / 60);
      return `${hr}h ${min % 60}m ago`;
    }

    function render() {
      const list2 = Array.from(alerts.values()).sort((a, b) => b.createdAt - a.createdAt);
      counter.textContent = `${list2.length} active`;
      empty.style.display = list2.length === 0 ? 'block' : 'none';
      list.innerHTML = list2.map(a => `
        <div class="alert urgency-${escape(a.urgency === 'critical' ? 'critical' : a.urgency === 'high' ? 'high' : 'other')}" data-id="${escape(a.id)}">
          <div class="body">
            <span class="urgency-tag">${escape(a.urgency || 'alert')}</span>
            <div class="message">${escape(a.message || '')}</div>
            <div class="ts" data-ts="${a.createdAt}">${formatTimeAgo(a.createdAt)}</div>
          </div>
          <button class="ack-btn" onclick="ack('${escape(a.id)}')">Acknowledge</button>
        </div>
      `).join('');
    }

    function escape(s) {
      return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    function addAlert(a) {
      const isNew = !alerts.has(a.id);
      alerts.set(a.id, a);
      if (isNew && audioEnabled) {
        if (a.urgency === 'critical') startKlaxon(a.id);
        else playChime();
      }
      render();
    }

    function ack(id) {
      stopKlaxon(id);
      fetch(`/api/alerts/${encodeURIComponent(id)}/ack`, { method: 'POST' })
        .catch(err => console.error('ack failed:', err));
      // Remove optimistically; the server will broadcast `alert:ack` too.
      alerts.delete(id);
      render();
    }

    // Refresh "Xm ago" labels every 10s.
    setInterval(render, 10000);

    // Initial load — fetch any active alerts the server already has.
    fetch('/api/alerts')
      .then(r => r.json())
      .then(payload => {
        if (payload && payload.success && Array.isArray(payload.alerts)) {
          payload.alerts.forEach(a => alerts.set(a.id, a));
          render();
          // Resume klaxons for any active critical alerts that survived
          // a page refresh.
          if (audioEnabled) {
            for (const a of payload.alerts) {
              if (a.urgency === 'critical') startKlaxon(a.id);
            }
          }
        }
      })
      .catch(err => console.error('initial load failed:', err));

    // Live updates via Socket.IO.
    const socket = io();
    socket.on('connect', () => {
      dot.className = 'status-dot connected';
      statusText.textContent = 'Live';
      socket.emit('alerts:subscribe');
    });
    socket.on('disconnect', () => {
      dot.className = 'status-dot disconnected';
      statusText.textContent = 'Disconnected — reconnecting…';
      // Stop all active klaxons; they'll be restarted on reconnect via /api/alerts.
      for (const id of Array.from(activeKlaxons.keys())) stopKlaxon(id);
    });
    socket.on('alert:new', addAlert);
    socket.on('alert:ack', ({ id }) => { stopKlaxon(id); alerts.delete(id); render(); });
  </script>
</body>
</html>
